<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Stream Player | AppsStudios</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            color: #39FF14; /* Verde Neón */
            text-transform: uppercase;
            text-shadow: 
                0 0 5px #39FF14,
                0 0 10px #39FF14,
                0 0 20px #39FF14,
                0 0 40px #008000;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #cccccc;
        }

        .brand {
            font-weight: bold;
            color: #ffffff;
            border-top: 1px solid #333;
            padding-top: 15px;
            margin-top: 20px;
        }

        .neon-border {
            border: 2px solid #39FF14;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
    </style>
</head>
<body>

    <div class="neon-border">
        <h1>Goal Stream Player</h1>
